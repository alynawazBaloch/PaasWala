<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0F0A"/>
      <stop offset="50%" stop-color="#0D1A0D"/>
      <stop offset="100%" stop-color="#0A0F0A"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <linearGradient id="emeraldGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#52B788" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2D6A4F" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#52B788" flood-opacity="0.3"/>
    </filter>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes shimmer {
        0% { background-position: -200px 0; }
        100% { background-position: 200px 0; }
      }
      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes expandWidth {
        0% { width: 0; }
        100% { width: 60px; }
      }
      .logo-icon { animation: float 3s ease-in-out infinite; }
      .ring-outer { animation: rotate 8s linear infinite; transform-origin: 60px 60px; }
      .ring-inner { animation: rotate 6s linear infinite reverse; transform-origin: 60px 60px; }
      .title { animation: fadeInUp 0.8s ease-out; }
      .subtitle { animation: fadeInUp 0.8s ease-out 0.3s both; }
      .tagline { animation: fadeInUp 0.8s ease-out 0.6s both; }
      .shimmer-line {
        height: 2px;
        background: linear-gradient(90deg, transparent, #52B788, transparent);
        background-size: 200px 100%;
        animation: shimmer 2s infinite linear;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)" rx="20" ry="20"/>

  <!-- Gradient border -->
  <rect x="1" y="1" width="898" height="278" rx="19" ry="19" fill="none" stroke="url(#emerald)" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Animated rings -->
  <g transform="translate(60, 60)">
    <circle class="ring-outer" cx="60" cy="60" r="50" fill="none" stroke="url(#emeraldGlow)" stroke-width="1.5" stroke-dasharray="4 8"/>
    <circle class="ring-inner" cx="60" cy="60" r="35" fill="none" stroke="#52B788" stroke-width="1" stroke-dasharray="2 6" opacity="0.5"/>
  </g>

  <!-- Logo icon group -->
  <g class="logo-icon" transform="translate(48, 48)">
    <!-- House body -->
    <path d="M24 8L8 22h4v12h10v-8h6v8h8V22h4L24 8z" fill="none" stroke="#52B788" stroke-width="2" stroke-linejoin="round"/>
    <!-- Sun accent -->
    <circle cx="34" cy="18" r="4" fill="#52B788" opacity="0.6"/>
    <circle cx="34" cy="18" r="2" fill="#2D6A4F"/>
  </g>

  <!-- Title -->
  <text x="130" y="65" class="title" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#FFFFFF" letter-spacing="-1">PaasWala</text>
  <text x="130" y="95" class="subtitle" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="#A8B8A8" letter-spacing="3" font-weight="500" text-transform="uppercase">پاس والا — THE ONE NEARBY</text>

  <!-- Shimmer line -->
  <rect x="130" y="115" width="60" height="2" rx="1" fill="#52B788" class="shimmer-line"/>

  <!-- Tagline -->
  <text x="130" y="145" class="tagline" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#6B7B6B">A premium neighborhood-first social platform for Pakistan.</text>
  <text x="130" y="165" class="tagline" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#6B7B6B">Connect with your mohalla — secure, real-time, community-driven.</text>

  <!-- Bottom stats bar -->
  <g>
    <rect x="20" y="200" width="860" height="56" rx="12" fill="#111811" opacity="0.8"/>
    <rect x="20" y="200" width="860" height="56" rx="12" fill="none" stroke="rgba(82,183,136,0.15)" stroke-width="1"/>

    <!-- Stat items -->
    <g transform="translate(60, 222)">
      <text font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#52B788" text-anchor="middle">React Native</text>
      <text y="18" font-family="Inter, sans-serif" font-size="11" fill="#6B7B6B" text-anchor="middle">Expo SDK 56</text>
    </g>
    <line x1="235" y1="212" x2="235" y2="244" stroke="rgba(82,183,136,0.15)" stroke-width="1"/>
    <g transform="translate(285, 222)">
      <text font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#52B788" text-anchor="middle">TypeScript</text>
      <text y="18" font-family="Inter, sans-serif" font-size="11" fill="#6B7B6B" text-anchor="middle">Type-safe</text>
    </g>
    <line x1="460" y1="212" x2="460" y2="244" stroke="rgba(82,183,136,0.15)" stroke-width="1"/>
    <g transform="translate(510, 222)">
      <text font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#52B788" text-anchor="middle">Firebase</text>
      <text y="18" font-family="Inter, sans-serif" font-size="11" fill="#6B7B6B" text-anchor="middle">Auth + Firestore</text>
    </g>
    <line x1="660" y1="212" x2="660" y2="244" stroke="rgba(82,183,136,0.15)" stroke-width="1"/>
    <g transform="translate(720, 222)">
      <text font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#52B788" text-anchor="middle">Real-time</text>
      <text y="18" font-family="Inter, sans-serif" font-size="11" fill="#6B7B6B" text-anchor="middle">Live messaging</text>
    </g>
  </g>
</svg>
